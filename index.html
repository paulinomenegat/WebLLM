<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local IA - WebLLM Local Chat</title>
    <!-- A tag base ajuda a evitar erros de URL em ambientes de iframe/preview -->
    <base href="https://localhost/">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .chat-container::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        
        @keyframes dot-pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .typing-dot { animation: dot-pulse 1.5s infinite ease-in-out; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg text-white">
                <i data-lucide="bot"></i>
            </div>
            <div>
                <h1 id="app-title" class="font-bold text-lg leading-tight">Local IA</h1>
                <p class="text-xs text-slate-500 flex items-center gap-1">
                    <span id="gpu-status-dot" class="w-2 h-2 rounded-full bg-yellow-400"></span>
                    <span id="gpu-status-text">Verificando WebGPU...</span>
                </p>
            </div>
        </div>
        <div class="flex gap-2">
            <button id="clear-chat" class="p-2 text-slate-400 hover:text-red-500 transition-colors" title="Limpar conversa">
                <i data-lucide="trash-2"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        
        <!-- Sidebar de Configuração -->
        <aside class="w-full md:w-80 bg-white border-r border-slate-200 p-6 flex flex-col gap-6 overflow-y-auto">
            <section>
                <label id="model-label" class="block text-sm font-semibold text-slate-700 mb-2">Modelo de Inferência (WebLLM)</label>
                <select id="model-select" class="w-full p-2 border border-slate-300 rounded-md bg-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="Llama-3-8B-Instruct-q4f32_1-MLC">Llama 3 (8B) - Poderoso</option>
                    <option value="Phi-3-mini-4k-instruct-q4f16_1-MLC" selected>Phi-3 Mini (3.8B) - Rápido</option>
                    <option value="Mistral-7B-v0.3-q4f16_1-MLC">Mistral v0.3 (7B)</option>
                    <option value="gemma-2b-it-q4f16_1-MLC">Gemma (2B) - Leve</option>
                    <option value="Qwen2-1.5B-Instruct-q4f16_1-MLC">Qwen 2 (1.5B) - Super Leve</option>
                </select>
            </section>

            <!-- Configurações do Algoritmo -->
            <section class="space-y-4 border-t border-slate-100 pt-4">
                <h3 id="settings-label" class="text-xs font-bold text-slate-400 uppercase tracking-wider">Configurações</h3>
                
                <div>
                    <div class="flex justify-between mb-1">
                        <label id="temp-label" class="text-xs font-medium text-slate-600">Temperatura</label>
                        <span id="temp-value" class="text-xs font-mono text-indigo-600">0.7</span>
                    </div>
                    <input type="range" id="temp-range" min="0" max="2" step="0.1" value="0.7" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                </div>

                <div>
                    <div class="flex justify-between mb-1">
                        <label id="tokens-label" class="text-xs font-medium text-slate-600">Tokens Máximos</label>
                        <span id="tokens-value" class="text-xs font-mono text-indigo-600">512</span>
                    </div>
                    <input type="range" id="tokens-range" min="128" max="2048" step="128" value="512" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                </div>
            </section>

            <button id="load-model-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg transition-all flex items-center justify-center gap-2 shadow-sm">
                <i data-lucide="download-cloud" class="w-4 h-4"></i>
                <span id="load-btn-text">Carregar Modelo</span>
            </button>

            <!-- Barra de Progresso -->
            <div id="progress-container" class="hidden space-y-2">
                <div class="flex justify-between text-xs font-medium text-slate-600">
                    <span id="progress-status">Baixando...</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="w-full bg-slate-200 rounded-full h-2 overflow-hidden">
                    <div id="progress-bar" class="bg-indigo-600 h-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <p id="progress-detail" class="text-[10px] text-slate-400 truncate"></p>
            </div>

            <!-- Seleção de Idioma -->
            <section class="space-y-2 border-t border-slate-100 pt-4">
                <label id="lang-label" class="block text-sm font-semibold text-slate-700">Idioma da Interface</label>
                <select id="lang-select" class="w-full p-2 border border-slate-300 rounded-md bg-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="pt-br" selected>Português (BR)</option>
                    <option value="en">English</option>
                    <option value="es">Español</option>
                    <option value="zh">中文</option>
                </select>
            </section>

            <div class="mt-auto pt-6 border-t border-slate-100">
                <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                    <h3 id="privacy-title" class="text-xs font-bold text-blue-700 uppercase mb-1">Privacidade Total</h3>
                    <p id="privacy-desc" class="text-[11px] text-blue-600 leading-relaxed">Este modelo roda 100% no seu dispositivo via WebGPU.</p>
                </div>
            </div>
        </aside>

        <!-- Área do Chat -->
        <section class="flex-1 flex flex-col bg-slate-50 relative">
            <div id="chat-window" class="chat-container flex-1 overflow-y-auto p-6 space-y-6">
                <div class="flex gap-4 max-w-3xl">
                    <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center flex-shrink-0">
                        <i data-lucide="bot" class="w-5 h-5"></i>
                    </div>
                    <div id="welcome-msg" class="bg-white border border-slate-200 p-4 rounded-2xl rounded-tl-none shadow-sm text-sm">
                        Olá! Configure os parâmetros ao lado e carregue a IA para conversar localmente.
                    </div>
                </div>
            </div>

            <div class="p-6 bg-transparent">
                <div class="max-w-4xl mx-auto relative">
                    <textarea id="user-input" rows="1" disabled
                        placeholder="Aguardando carregamento do modelo..." 
                        class="w-full p-4 pr-16 bg-white border border-slate-300 rounded-2xl shadow-lg focus:ring-2 focus:ring-indigo-500 outline-none resize-none text-sm disabled:bg-slate-100"
                    ></textarea>
                    <button id="send-btn" disabled class="absolute right-3 bottom-3 p-2 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 disabled:bg-slate-300">
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import * as webllm from "https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.78/+esm";

        lucide.createIcons();

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const modelSelect = document.getElementById('model-select');
        const loadBtn = document.getElementById('load-model-btn');
        const tempRange = document.getElementById('temp-range');
        const tempValue = document.getElementById('temp-value');
        const tokensRange = document.getElementById('tokens-range');
        const tokensValue = document.getElementById('tokens-value');
        
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const progressStatus = document.getElementById('progress-status');
        const progressDetail = document.getElementById('progress-detail');
        const progressContainer = document.getElementById('progress-container');

        const langSelect = document.getElementById('lang-select');
        let currentLang = 'pt-br';

        const translations = {
            'pt-br': {
                title: "Local IA", checkingGPU: "Verificando WebGPU...", gpuActive: "WebGPU Ativa",
                modelLabel: "Modelo de Inferência (WebLLM)", settingsLabel: "Configurações",
                tempLabel: "Temperatura", tokensLabel: "Tokens Máximos", langLabel: "Idioma da Interface",
                loadBtn: "Carregar Modelo", loadingBtn: "Carregando...", readyBtn: "Modelo Pronto", errorBtn: "Erro ao Carregar",
                downloading: "Baixando...", privacyTitle: "Privacidade Total", privacyDesc: "Este modelo roda 100% no seu dispositivo via WebGPU.",
                welcomeMsg: "Olá! Configure os parâmetros ao lado e carregue a IA para conversar localmente.",
                placeholderWait: "Aguardando carregamento do modelo...", placeholderReady: "Envie uma mensagem...",
                typing: "IA está pensando...", clearMsg: "Memória limpa.", systemPrompt: "Você é um assistente útil. Responda em português."
            },
            'en': {
                title: "Local IA", checkingGPU: "Checking WebGPU...", gpuActive: "WebGPU Active",
                modelLabel: "Inference Model (WebLLM)", settingsLabel: "Settings",
                tempLabel: "Temperature", tokensLabel: "Max Tokens", langLabel: "Interface Language",
                loadBtn: "Load Model", loadingBtn: "Loading...", readyBtn: "Model Ready", errorBtn: "Load Error",
                downloading: "Downloading...", privacyTitle: "Total Privacy", privacyDesc: "This model runs 100% on your device via WebGPU.",
                welcomeMsg: "Hello! Configure the parameters on the side and load the AI to chat locally.",
                placeholderWait: "Waiting for model to load...", placeholderReady: "Send a message...",
                typing: "AI is thinking...", clearMsg: "Memory cleared.", systemPrompt: "You are a helpful assistant. Answer in English."
            },
            'es': {
                title: "Local IA", checkingGPU: "Verificando WebGPU...", gpuActive: "WebGPU Activa",
                modelLabel: "Modelo de Inferencia (WebLLM)", settingsLabel: "Configuraciones",
                tempLabel: "Temperatura", tokensLabel: "Tokens Máximos", langLabel: "Idioma de la Interfaz",
                loadBtn: "Cargar Modelo", loadingBtn: "Cargando...", readyBtn: "Modelo Listo", errorBtn: "Error al Cargar",
                downloading: "Descargando...", privacyTitle: "Privacidad Total", privacyDesc: "Este modelo se ejecuta 100% en tu dispositivo a través de WebGPU.",
                welcomeMsg: "¡Hola! Configura los parámetros al lado y carga la IA para chatear localmente.",
                placeholderWait: "Esperando que se cargue el modelo...", placeholderReady: "Envía un mensaje...",
                typing: "La IA está pensando...", clearMsg: "Memoria limpiada.", systemPrompt: "Eres un asistente útil. Responde en español."
            },
            'zh': {
                title: "Local IA", checkingGPU: "正在检查 WebGPU...", gpuActive: "WebGPU 已激活",
                modelLabel: "推理模型 (WebLLM)", settingsLabel: "设置",
                tempLabel: "温度", tokensLabel: "最大 Tokens", langLabel: "界面语言",
                loadBtn: "加载模型", loadingBtn: "加载中...", readyBtn: "模型就绪", errorBtn: "加载失败",
                downloading: "下载中...", privacyTitle: "完全隐私", privacyDesc: "此模型通过 WebGPU 100% 在您的设备上运行。",
                welcomeMsg: "你好！配置旁边的参数并加载 AI 即可在本地聊天。",
                placeholderWait: "等待模型加载...", placeholderReady: "发送消息...",
                typing: "AI 正在思考...", clearMsg: "记忆已清除。", systemPrompt: "你是一个有用的助手。用中文回答。"
            }
        };

        function updateUI() {
            const t = translations[currentLang];
            document.title = `${t.title} - WebLLM Local Chat`;
            document.getElementById('app-title').innerText = t.title;
            document.getElementById('model-label').innerText = t.modelLabel;
            document.getElementById('settings-label').innerText = t.settingsLabel;
            document.getElementById('temp-label').innerText = t.tempLabel;
            document.getElementById('tokens-label').innerText = t.tokensLabel;
            document.getElementById('lang-label').innerText = t.langLabel;
            document.getElementById('privacy-title').innerText = t.privacyTitle;
            document.getElementById('privacy-desc').innerText = t.privacyDesc;
            
            const welcomeMsgEl = document.getElementById('welcome-msg');
            if (welcomeMsgEl) welcomeMsgEl.innerText = t.welcomeMsg;

            // Mantém a cor do dot, muda apenas o texto corretamente
            const gpuText = document.getElementById('gpu-status-text').innerText;
            if (gpuText.includes('Ativa') || gpuText.includes('Active') || gpuText.includes('Activa') || gpuText.includes('已激活')) {
                document.getElementById('gpu-status-text').innerText = t.gpuActive;
            } else {
                document.getElementById('gpu-status-text').innerText = t.checkingGPU;
            }

            // Atualiza placeholders e botão dependendo do status de carregamento do modelo
            if (isModelLoaded) {
                userInput.placeholder = t.placeholderReady;
                document.getElementById('load-btn-text').innerText = t.readyBtn;
            } else {
                userInput.placeholder = t.placeholderWait;
                if (!loadBtn.disabled) {
                    document.getElementById('load-btn-text').innerText = t.loadBtn;
                } else if (document.getElementById('load-btn-text').innerText !== t.loadBtn && document.getElementById('load-btn-text').innerText !== t.readyBtn && document.getElementById('load-btn-text').innerText !== t.errorBtn) {
                    document.getElementById('load-btn-text').innerText = t.loadingBtn;
                }
            }

            if (!progressContainer.classList.contains('hidden') && !isModelLoaded) {
                progressStatus.innerText = t.downloading;
            }

            if (chatHistory.length === 1 && chatHistory[0].role === 'system') {
                chatHistory[0].content = t.systemPrompt;
            }
        }

        langSelect.addEventListener('change', (e) => {
            currentLang = e.target.value;
            updateUI();
        });

        let engine;
        let isModelLoaded = false;
        let chatHistory = [{ role: "system", content: translations[currentLang].systemPrompt }];

        // Atualizar labels de configuração
        tempRange.addEventListener('input', () => tempValue.innerText = tempRange.value);
        tokensRange.addEventListener('input', () => tokensValue.innerText = tokensRange.value);

        async function checkWebGPU() {
            if ("gpu" in navigator) {
                const adapter = await navigator.gpu.requestAdapter();
                if (adapter) {
                    document.getElementById('gpu-status-text').innerText = translations[currentLang].gpuActive;
                    document.getElementById('gpu-status-dot').classList.replace('bg-yellow-400', 'bg-green-500');
                }
            }
        }
        checkWebGPU();

        // Correção de Bug: Habilitar botão ao trocar de modelo
        modelSelect.addEventListener('change', () => {
            loadBtn.disabled = false;
            document.getElementById('load-btn-text').innerText = translations[currentLang].loadBtn;
            if (loadBtn.classList.contains('bg-emerald-600')) {
                loadBtn.classList.replace('bg-emerald-600', 'bg-indigo-600');
            }
            if (isModelLoaded) {
                isModelLoaded = false;
                userInput.disabled = true;
                sendBtn.disabled = true;
                userInput.placeholder = translations[currentLang].placeholderWait;
            }
        });

        async function loadModel() {
            loadBtn.disabled = true;
            document.getElementById('load-btn-text').innerText = translations[currentLang].loadingBtn;
            progressContainer.classList.remove('hidden');
            progressStatus.innerText = translations[currentLang].downloading;
            
            try {
                engine = await webllm.CreateMLCEngine(modelSelect.value, {
                    appConfig: webllm.prebuiltAppConfig,
                    initProgressCallback: (report) => {
                        const p = Math.round(report.progress * 100);
                        progressBar.style.width = `${p}%`;
                        progressPercent.innerText = `${p}%`;
                        progressDetail.innerText = report.text;
                    }
                });
                
                isModelLoaded = true;
                userInput.disabled = false;
                userInput.placeholder = translations[currentLang].placeholderReady;
                sendBtn.disabled = false;
                document.getElementById('load-btn-text').innerText = translations[currentLang].readyBtn;
                loadBtn.classList.replace('bg-indigo-600', 'bg-emerald-600');
            } catch (err) {
                console.error(err);
                loadBtn.disabled = false;
                document.getElementById('load-btn-text').innerText = translations[currentLang].errorBtn;
            }
        }

        function addMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex gap-4 max-w-3xl ${role === 'user' ? 'ml-auto flex-row-reverse' : ''}`;
            wrapper.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="${role === 'user' ? 'user' : 'bot'}" class="w-5 h-5"></i>
                </div>
                <div class="${role === 'user' ? 'bg-indigo-600 text-white' : 'bg-white border text-slate-800'} p-4 rounded-2xl text-sm whitespace-pre-wrap shadow-sm">${text}</div>
            `;
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            lucide.createIcons();
            return wrapper;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || !isModelLoaded) return;

            userInput.value = '';
            addMessage('user', text);
            chatHistory.push({ role: "user", content: text });

            // Indicador de digitação
            const typing = document.createElement('div');
            typing.id = 'typing';
            typing.className = 'flex gap-2 p-4 italic text-xs text-slate-400';
            typing.innerText = translations[currentLang].typing;
            chatWindow.appendChild(typing);

            try {
                const chunks = await engine.chat.completions.create({
                    messages: chatHistory,
                    stream: true,
                    // APLICANDO AS CONFIGURAÇÕES DO USUÁRIO
                    temperature: parseFloat(tempRange.value),
                    max_tokens: parseInt(tokensRange.value)
                });

                typing.remove();
                const aiWrapper = addMessage('assistant', '');
                const aiContainer = aiWrapper.querySelector('div:last-child');
                
                let fullText = "";
                for await (const chunk of chunks) {
                    fullText += chunk.choices[0]?.delta?.content || "";
                    aiContainer.innerText = fullText;
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }
                chatHistory.push({ role: "assistant", content: fullText });
            } catch (err) {
                console.error(err);
                typing.innerText = translations[currentLang].errorBtn;
            }
        }

        loadBtn.addEventListener('click', loadModel);
        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }});
        document.getElementById('clear-chat').addEventListener('click', () => {
            chatWindow.innerHTML = '';
            chatHistory = [{ role: "system", content: translations[currentLang].systemPrompt }];
            addMessage('assistant', translations[currentLang].clearMsg);
        });
        
        // Inicializa as traduções para aplicar ao primeiro load de ecrã
        updateUI();
    </script>
</body>
</html>
